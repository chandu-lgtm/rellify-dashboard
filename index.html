  var seg={};S.people.forEach(function(p){seg[p.segment]=(seg[p.segment]||0)+1;});
  var stats=[['Prospects sourced',String(total),'Revised list · enriched'],['Approved',String(appr),appr?'In the pipeline':'Approve to start outreach'],['LinkedIn profiles',String(total),'Full names + URLs on file'],['Profile views','—','No data yet — first session pending']];
  return '<div class="screen" style="max-width:1060px"><div><div class="page-h">Analytics</div><div class="page-sub">Network growth, engagement and pipeline velocity — populates after the first session</div></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px">'+stats.map(function(s){return '<div class="card pad"><div class="eyebrow">'+s[0]+'</div><div style="display:flex;align-items:baseline;gap:8px;margin-top:4px"><span class="mono" style="font-size:26px;font-weight:800;letter-spacing:-0.02em">'+s[1]+'</span></div><div style="font-size:11.5px;color:var(--faint);font-weight:600;margin-top:3px">'+esc(s[2])+'</div></div>';}).join('')+'</div><div class="card pad"><div class="h-title" style="margin-bottom:10px">Sourced prospects by role</div><div style="display:flex;flex-direction:column;gap:11px">'+(function(){var mx=Math.max.apply(null,Object.keys(seg).map(function(k){return seg[k];}).concat([1]));return Object.keys(seg).map(function(k){return '<div style="display:flex;align-items:center;gap:12px"><div style="width:120px;font-size:12.5px;font-weight:700;color:var(--sec);flex-shrink:0">'+esc(k)+'</div><div style="flex:1;height:16px;background:#F2F5F4;border-radius:5px;overflow:hidden"><div style="height:100%;border-radius:5px;background:var(--teal);width:'+Math.round(seg[k]/mx*100)+'%"></div></div><div class="mono" style="width:26px;text-align:right;font-weight:700;font-size:13px">'+seg[k]+'</div></div>';}).join('');})()+'</div><div style="font-size:12px;color:var(--muted);font-weight:700;margin-top:14px">Impression &amp; engagement charts appear after the first agent session.</div></div></div>';
}

function vPlanModal(){if(!S.planOpen)return '';var onCount=S.planOn.filter(Boolean).length;return '<div class="overlay" onclick="A.closePlan()"><div class="modal" onclick="event.stopPropagation()"><div style="font-weight:800;font-size:16px">Today\'s plan</div><div class="page-sub" style="margin-bottom:16px">Review what the agent will do. Untick anything you don\'t want to run, then approve.</div><div style="display:flex;flex-direction:column;gap:9px">'+PLAN_TASKS.map(function(t,i){var on=S.planOn[i];return '<button onclick="A.togglePlan('+i+')" style="display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;cursor:pointer;font-family:inherit;border:1px solid '+(on?'#BFE0DA':'var(--border)')+';background:'+(on?'#F7FBFA':'#fff')+';border-radius:12px;padding:12px 14px"><div style="width:20px;height:20px;border-radius:6px;display:grid;place-items:center;flex-shrink:0;margin-top:1px;border:2px solid '+(on?'var(--teal)':'#C6D0CE')+';background:'+(on?'var(--teal)':'#fff')+'">'+(on?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>':'')+'</div><div style="min-width:0"><div style="font-weight:800;font-size:13.5px;color:'+(on?'var(--ink)':'var(--faint)')+'">'+esc(t.title)+'</div><div style="font-size:12.5px;color:var(--muted);line-height:1.5;margin-top:2px">'+esc(t.desc)+'</div></div></button>';}).join('')+'</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:15px"><div style="border:1px solid var(--border-soft);background:#FAFCFB;border-radius:11px;padding:11px 14px"><div class="eyebrow">Estimated duration</div><div style="font-weight:800;font-size:13.5px;margin-top:3px">'+(onCount?(onCount*3)+'–'+(onCount*4)+' minutes':'—')+'</div></div><div style="border:1px solid var(--border-soft);background:#FAFCFB;border-radius:11px;padding:11px 14px"><div class="eyebrow">Expected outcomes</div><div style="font-weight:800;font-size:13.5px;margin-top:3px">account check · warmups · invite drafts</div></div></div><div style="display:flex;gap:10px;margin-top:18px"><button class="btn btn-teal btn-lg" style="flex:1" onclick="A.approvePlan()">✓ Approve &amp; start agent</button><button class="btn btn-out btn-lg" onclick="A.closePlan()">Cancel</button></div></div></div>';}
function vEditorModal(){if(!S.editorOpen)return '';var p=S.editorIdx!=null?S.people[S.editorIdx]:null;return '<div class="overlay" onclick="A.closeEditor()"><div class="modal" style="width:520px" onclick="event.stopPropagation()"><div style="font-weight:800;font-size:16px">'+(p?'Edit prospect':'Add prospect')+'</div><div class="page-sub" style="margin-bottom:16px">Manually added prospects follow the same rules — no outreach happens until they\'re approved.</div><div style="display:flex;flex-direction:column;gap:13px"><div><div style="font-size:12px;font-weight:800;margin-bottom:5px">Full name <span style="color:var(--danger)">*</span></div><input id="eName" class="f" placeholder="e.g. Priya Iyer" value="'+esc(p?p.name:'')+'"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><div><div style="font-size:12px;font-weight:800;margin-bottom:5px">Title</div><input id="eTitle" class="f" placeholder="e.g. CMO" value="'+esc(p?p.title:'')+'"></div><div><div style="font-size:12px;font-weight:800;margin-bottom:5px">Company</div><input id="eCompany" class="f" placeholder="e.g. Acme Marketing" value="'+esc(p&&p.company!=='—'?p.company:'')+'"></div></div><div><div style="font-size:12px;font-weight:800;margin-bottom:5px">LinkedIn URL</div><input id="eLi" class="f" placeholder="https://www.linkedin.com/in/…" value="'+esc(p?p.li:'')+'"></div></div><div style="display:flex;gap:10px;margin-top:20px"><button class="btn btn-teal" style="height:38px" onclick="A.saveEditor()">'+(p?'Save changes':'Add prospect')+'</button><button class="btn btn-out" style="height:38px" onclick="A.closeEditor()">Cancel</button></div></div></div>';}

function render(){
  var body;switch(S.screen){case 'prospects':body=vProspects();break;case 'activity':body=vActivity();break;case 'strategy':body=vStrategy();break;case 'content':body=vContent();break;case 'conversations':body=vConversations();break;case 'analytics':body=vAnalytics();break;default:body=vDashboard();}
  document.getElementById('app').innerHTML='<div class="app">'+vSidebar()+'<div class="main">'+vTopbar()+'<main class="scroll">'+body+'</main></div></div>'+vPlanModal()+vEditorModal()+(S.toast?'<div class="toast">'+esc(S.toast)+'</div>':'');
}
document.addEventListener('keydown',function(e){if(e.key==='Escape'){if(S.editorOpen){S.editorOpen=false;render();}else if(S.planOpen){S.planOpen=false;render();}}});
render();
</script>
</body>
</html>
