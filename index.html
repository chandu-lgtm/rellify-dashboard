<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rellify — LinkedIn Agent</title>
<meta name="description" content="Rellify's LinkedIn outreach agent — approvals, pipeline, strategy and daily plan." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&family=Newsreader:ital,opsz,wght@1,6..72,500;1,6..72,600&display=swap" rel="stylesheet">
<style>
  :root{
    --canvas:#F6F8F7; --card:#FFFFFF; --border:#E7ECEA; --border-soft:#EDF1F0; --hair:#F2F5F4;
    --ink:#16232A; --ink2:#33454B; --sec:#45565C; --sec2:#5C6E70; --muted:#7A8A8C; --faint:#9AA8A8;
    --teal:#0E8577; --teal-h:#0B6B60; --teal-tint:#E4F2EF; --teal-tint2:#EDF4F2; --teal-soft:#F4FAF8;
    --green:#1E9A5A; --green-tint:#E8F6EE; --green-bd:#C7E8D4; --green-tx:#1E7A48; --green-tx2:#14532D;
    --amber:#B4690E; --amber-tint:#FBF1E1; --amber-tint2:#FDF8EC; --amber-bd:#F0DDBC; --amber-tx:#8F5410; --amber-tx2:#7A5A1E;
    --purple:#5B4AA8; --purple-tint:#F4F2FB; --purple-bd:#E3DEF5;
    --danger:#C24040; --danger-bd:#EBC9C9; --chip:#EDF1F0;
    --shadow:0 1px 2px rgba(22,35,42,0.03), 0 12px 32px -18px rgba(22,35,42,0.14);
    --shadow-hero:0 1px 2px rgba(22,35,42,0.03), 0 16px 40px -20px rgba(14,133,119,0.18);
    --focus:0 0 0 3px rgba(14,133,119,0.32);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--canvas);color:var(--ink);font-family:'Manrope',system-ui,-apple-system,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  ::selection{background:#CDE9E3;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;}
  :focus-visible{outline:0;box-shadow:var(--focus);border-radius:10px;}
  .mono{font-family:'JetBrains Mono',monospace;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(14,133,119,0.45);}70%{box-shadow:0 0 0 8px rgba(14,133,119,0);}100%{box-shadow:0 0 0 0 rgba(14,133,119,0);}}
  @keyframes spin{to{transform:rotate(360deg);}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

  .app{display:flex;width:100%;height:100vh;overflow:hidden;}

  /* Sidebar */
  .sidebar{width:236px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0;}
  .brand{display:flex;align-items:center;gap:11px;padding:18px 18px 16px;}
  .brand .logo{width:38px;height:38px;border-radius:11px;background:var(--teal);display:grid;place-items:center;color:#fff;font-weight:800;font-size:17px;flex-shrink:0;}
  .brand .n{font-weight:800;font-size:14.5px;letter-spacing:-0.01em;}
  .brand .r{font-size:11.5px;color:var(--muted);font-weight:600;}
  .sb-div{height:1px;background:var(--border-soft);margin:0 18px 10px;}
  .sb-eyebrow{font-size:10.5px;font-weight:700;letter-spacing:0.09em;text-transform:uppercase;color:var(--faint);padding:0 20px 8px;}
  .nav{display:flex;flex-direction:column;gap:2px;padding:0 10px;overflow-y:auto;flex:1;min-height:0;}
  .nav button{display:flex;align-items:center;gap:11px;width:100%;border:none;cursor:pointer;text-align:left;padding:9px 12px;border-radius:999px;font-size:13.5px;background:transparent;color:var(--sec);font-weight:600;}
  .nav button:hover{background:#EDF4F2;}
  .nav button.active{background:var(--teal-tint);color:var(--teal-h);font-weight:800;}
  .nav svg{flex-shrink:0;}
  .nav .count{margin-left:auto;font-size:11px;font-weight:700;background:var(--chip);color:var(--sec2);border-radius:20px;padding:2px 8px;font-family:'JetBrains Mono',monospace;}
  .sb-bottom{padding:12px 10px 14px;border-top:1px solid var(--border-soft);}
  .user{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:11px;background:#FAFCFB;}
  .user .av{width:32px;height:32px;border-radius:50%;background:var(--teal-tint);color:var(--teal-h);display:grid;place-items:center;font-weight:800;font-size:12px;flex-shrink:0;}
  .user .n{font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .user .r{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pro{font-size:9.5px;font-weight:800;letter-spacing:0.06em;background:var(--amber-tint);color:var(--amber);padding:3px 7px;border-radius:6px;}

  /* Main */
  .main{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;}
  .topbar{height:60px;flex-shrink:0;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;padding:0 22px;}
  .topbar .title{font-weight:800;font-size:15.5px;letter-spacing:-0.01em;}
  .topbar .date{font-size:11px;color:var(--faint);font-weight:600;}
  .topbar .vdiv{width:1px;height:26px;background:var(--border);}
  .topbar .run{height:36px;padding:0 15px;border:none;border-radius:999px;background:var(--teal);color:#fff;font-size:12.5px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:7px;}
  .topbar .run:hover{background:var(--teal-h);}
  .topbar .tu{display:flex;align-items:center;gap:9px;}
  .topbar .tu .av{width:32px;height:32px;border-radius:50%;background:var(--teal-tint);color:var(--teal-h);display:grid;place-items:center;font-weight:800;font-size:12px;}
  .scroll{flex:1;overflow-y:auto;min-height:0;padding:22px 26px 44px;}
  .screen{max-width:1160px;margin:0 auto;display:flex;flex-direction:column;gap:16px;}
  .screen.narrow{max-width:860px;gap:18px;}

  /* Buttons */
  .btn{height:34px;padding:0 15px;border-radius:999px;font-size:12.5px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:7px;border:1px solid transparent;}
  .btn-teal{background:var(--teal);color:#fff;border:none;}.btn-teal:hover{background:var(--teal-h);}
  .btn-out{background:#fff;color:var(--sec);border:1px solid var(--border);}.btn-out:hover{background:#F2F7F6;}
  .btn-out.teal{color:var(--teal);}
  .btn-amber{background:var(--amber);color:#fff;border:none;}.btn-amber:hover{background:#96570B;}
  .btn-amber-out{background:#fff;color:var(--amber-tx);border:1px solid #E3C68F;}.btn-amber-out:hover{background:#FCF7EC;}
  .btn-sm{height:30px;padding:0 13px;font-size:11.5px;}
  .btn-xs{height:28px;padding:0 12px;font-size:11.5px;}
  .btn-lg{height:42px;padding:0 18px;font-size:14px;}

  /* Cards & primitives */
  .card{background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);}
  .pad{padding:18px 20px;}
  .eyebrow{font-size:10.5px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);}
  .h-title{font-weight:800;font-size:14.5px;}
  .page-h{font-weight:800;font-size:19px;letter-spacing:-0.01em;}
  .page-sub{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:2px;}
  .chip{font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:7px;}
  .chip-teal{background:var(--teal-tint);color:var(--teal-h);}
  .chip-amber{background:var(--amber-tint);color:var(--amber-tx);}
  .chip-neutral{background:var(--chip);color:var(--sec2);}
  .badge{font-size:10.5px;font-weight:800;letter-spacing:0.05em;text-transform:uppercase;padding:3px 10px;border-radius:20px;}
  .empty{border:1px dashed #CFDBD8;border-radius:12px;background:#FBFDFC;padding:22px;text-align:center;color:var(--muted);font-size:13px;font-weight:600;line-height:1.55;}
  .empty b{color:var(--sec);display:block;font-size:13.5px;margin-bottom:4px;}
  input.f,select.f{width:100%;height:38px;border:1px solid var(--border);border-radius:9px;padding:0 13px;font-family:'Manrope',sans-serif;font-size:13px;color:var(--ink);background:#FAFCFB;outline:none;}
  input.f:focus,select.f:focus{box-shadow:var(--focus);border-color:var(--teal);}

  .grid-auto{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px;align-items:start;}
  .row-wrap{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;}
  .spacer{flex:1;}

  /* Toast */
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;font-weight:700;padding:11px 20px;border-radius:11px;box-shadow:0 10px 30px rgba(15,30,28,0.35);z-index:60;}
  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(15,30,28,0.4);display:grid;place-items:center;z-index:50;padding:24px;}
  .modal{background:#fff;border-radius:16px;width:560px;max-width:100%;max-height:86vh;overflow-y:auto;padding:24px 26px;box-shadow:0 18px 50px rgba(15,30,28,0.25);}

  @media (max-width:900px){
    .sidebar{width:74px;}
    .brand .who,.brand .sb-eyebrow,.nav button span:not(.count),.user .n,.user .r,.pro{display:none;}
    .nav button{justify-content:center;}
    .user{justify-content:center;}
  }
  @media (max-width:680px){
    .scroll{padding:16px 14px 40px;}
    .topbar{padding:0 14px;gap:10px;}
    .topbar .tu .n,.topbar .date{display:none;}
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";
/* ============================ RELLIFY — Day-1 data ============================ */
var TODAY = "Tuesday, Jul 21, 2026";
var QUOTES=[
  {t:"You can make more friends in two months by becoming interested in other people than you can in two years by trying to get other people interested in you.",a:"Dale Carnegie"},
  {t:"The currency of real networking is not greed but generosity.",a:"Keith Ferrazzi"},
  {t:"Your network is your net worth.",a:"Porter Gale"},
  {t:"Succeeding in business is all about making connections.",a:"Richard Branson"},
  {t:"Personal relationships are the fertile soil from which all advancement, all success, all achievement in real life grows.",a:"Ben Stein"},
  {t:"The richest people in the world look for and build networks; everyone else looks for work.",a:"Robert Kiyosaki"},
  {t:"The single greatest people skill is a highly developed and authentic interest in the other person.",a:"Bob Burg"}
];
var POST_BODY="The AI governance gap: most companies don't have an adoption problem, they have a governance problem. Everyone's already using AI — twelve people, twelve tools, twelve versions of the same workflow, none of it repeatable and none of it owned. The win isn't more AI. It's turning the good version into something your team owns and reuses.";
var POST_WHY="This is the exact pain your ICP describes: people using AI ad-hoc with no cohesion or governance. Leading with the problem (not the product) earns replies from COO/CIO/CTO readers and sets up the free blueprint offer.";

var ICONS={
  dashboard:'M3 3h7v9H3z M14 3h7v5h-7z M14 12h7v9h-7z M3 16h7v5H3z',
  prospects:'M9 11a3.2 3.2 0 1 0 0-6.4A3.2 3.2 0 0 0 9 11z M2.5 20c.6-3.4 3.4-5.4 6.5-5.4s5.9 2 6.5 5.4 M17 8.4a2.4 2.4 0 1 0 0-4.8 2.4 2.4 0 0 0 0 4.8 M16 12.5c2.6.2 4.4 1.8 5 4.5',
  activity:'M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z M12 6v6l4 2',
  strategy:'M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16z M12 16a4 4 0 1 0 0-8 4 4 0 0 0 0 8z M12 4V2 M12 22v-2 M4 12H2 M22 12h-2',
  content:'M4 4h12l4 4v12H4z M16 4v4h4 M8 12h8 M8 16h6',
  conversations:'M21 12a8 8 0 0 1-12.4 6.7L3 21l2.3-5.6A8 8 0 1 1 21 12z',
  analytics:'M3 20h18 M6 16V9 M11 16V5 M16 16v-7 M21 16v-4'
};
var NAV=[
  {id:'dashboard',label:'Dashboard'},{id:'prospects',label:'Prospects'},{id:'activity',label:'Activity'},
  {id:'strategy',label:'Strategy'},{id:'content',label:'Content'},{id:'conversations',label:'Conversations'},
  {id:'analytics',label:'Analytics'}
];
var TITLES={dashboard:'Dashboard',prospects:'Prospects',activity:'Activity',strategy:'Strategy',content:'Content',conversations:'Conversations',analytics:'Analytics'};

var PLAN_TASKS=[
  {title:'Confirm account health',desc:"Log into the Rellify LinkedIn account; read connection count, account type and any restriction flags."},
  {title:'Source first Apollo batch',desc:'Pull 15–25 prospects that match the approved ICP and tag them into segments. Requires ICP approval first.'},
  {title:'Warm up 5 prospects',desc:'Read profiles and comment thoughtfully on the latest post of 5 sourced prospects. No invite, no DM on Day 1.'},
  {title:'Draft connection-request notes',desc:'Prepare Direct-voice, no-pitch invite drafts for your approval — nothing sends automatically.'}
];

/* ============================ State ============================ */
var S={
  screen:'dashboard', toast:'', toastT:null,
  postApproval:'pending', postAsk:false, postNote:'',
  icpApproved:false,
  planOpen:false, running:false, runTaskIdx:0, runTimer:null,
  checksOpen:false, questionOpen:false,
  filter:'all', people:[], expandKey:null, confirmDelKey:null,
  editorOpen:false, editorIdx:null,
  planOn:[true,true,true,true]
};

/* ============================ Helpers ============================ */
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function initials(n){return n.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();}
function ic(path,sz,stroke){sz=sz||17;stroke=stroke||1.7;return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="'+stroke+'" stroke-linecap="round" stroke-linejoin="round"><path d="'+path+'"></path></svg>';}
function toast(m){clearTimeout(S.toastT);S.toast=m;render();S.toastT=setTimeout(function(){S.toast='';render();},2800);}
function stopE(e){e.stopPropagation();}

/* ============================ Actions ============================ */
var A={
  go:function(sc){S.screen=sc;S.expandKey=null;render();window.scrollTo(0,0);var sc2=document.querySelector('.scroll');if(sc2)sc2.scrollTop=0;},
  approvePost:function(){S.postApproval='approved';S.postAsk=false;render();toast('Post #1 approved — scheduled for the next posting slot');},
  rejectAsk:function(){S.postAsk=true;render();},
  rejectCancel:function(){S.postAsk=false;render();},
  rejectConfirm:function(){var el=document.getElementById('postNote');var note=el&&el.value.trim()?el.value.trim():'No note added';S.postNote=note;S.postApproval='held';S.postAsk=false;render();toast('Post rejected — your note was saved for the agent');},
  approveIcp:function(){S.icpApproved=true;render();toast('ICP approved — sourcing queued for the next session');},
  toast:function(m){toast(m);},
  openPlan:function(){S.planOpen=true;render();},
  closePlan:function(){S.planOpen=false;render();},
  togglePlan:function(i){S.planOn[i]=!S.planOn[i];render();},
  approvePlan:function(){
    var tasks=PLAN_TASKS.filter(function(_,i){return S.planOn[i];});
    if(!tasks.length){toast('Nothing selected — tick at least one task');return;}
    S.planOpen=false;S.running=true;S.runTaskIdx=0;S.screen='dashboard';render();
    var i=0,n=tasks.length;S._runTasks=tasks;
    clearInterval(S.runTimer);
    S.runTimer=setInterval(function(){i+=1;if(i>=n){clearInterval(S.runTimer);S.running=false;render();toast('Session complete — dashboard updated');}else{S.runTaskIdx=i;render();}},1600);
  },
  toggleChecks:function(){S.checksOpen=!S.checksOpen;render();},
  toggleQuestion:function(){S.questionOpen=!S.questionOpen;render();},
  setFilter:function(f){S.filter=f;render();},
  toggleRow:function(name){S.expandKey=(S.expandKey===name?null:name);S.confirmDelKey=null;render();},
  openAdd:function(){S.editorOpen=true;S.editorIdx=null;render();},
  openEdit:function(idx){S.editorOpen=true;S.editorIdx=idx;render();},
  closeEditor:function(){S.editorOpen=false;render();},
  saveEditor:function(){
    var name=(document.getElementById('eName')||{}).value; name=(name||'').trim();
    if(!name){toast('Name is required');return;}
    var title=((document.getElementById('eTitle')||{}).value||'').trim()||'—';
    var company=((document.getElementById('eCompany')||{}).value||'').trim()||'—';
    var stage=((document.getElementById('eStage')||{}).value)||'Approved';
    var score=Math.max(0,Math.min(100,parseInt(((document.getElementById('eScore')||{}).value)||'60',10)||0));
    var next=((document.getElementById('eNext')||{}).value||'').trim()||'No next step set';
    var SMAP={'Approved':0,'Warming':1,'Connected':2,'Conversation':3,'Meeting set':4};
    var p={name:name,title:title,company:company,stage:stage,stageIdx:SMAP[stage]||0,score:score,next:next,
      when:['Jul 21','','','',''],jn:['Added manually','','','',''],
      why:whyFor(score)};
    if(S.editorIdx!=null){S.people[S.editorIdx]=p;}else{S.people.unshift(p);}
    S.editorOpen=false;S.expandKey=name;render();toast(S.editorIdx!=null?'Prospect updated':'Prospect added');
  },
  delAsk:function(name){if(S.confirmDelKey!==name){S.confirmDelKey=name;render();return;}S.people=S.people.filter(function(x){return x.name!==name;});S.confirmDelKey=null;S.expandKey=null;render();toast('Prospect deleted');}
};
function whyFor(score){var max=[40,30,20,10];var pts=max.map(function(m){return Math.round(score*m/100);});var drift=score-pts.reduce(function(a,b){return a+b;},0);pts[0]+=drift;return pts.map(function(v,i){return [v,i===0?'Estimated from the manual score':''];});}

/* ============================ Pipeline compute ============================ */
function pipelineCounts(){
  var f=function(ff){return S.people.filter(function(p){return p.stageIdx===STAGE_IDX[ff];}).length;};
  var sourced=S.people.length, warming=cnt(1), connected=cnt(2), replied=cnt(3), meetings=cnt(4);
  function cnt(i){return S.people.filter(function(p){return p.stageIdx===i;}).length;}
  return {sourced:sourced,warming:warming,connected:connected,replied:replied,meetings:meetings,total:sourced};
}
var STAGE_IDX={sourced:0,warming:1,connected:2,conversation:3,meeting:4};

/* ============================ VIEWS ============================ */
function vSidebar(){
  var nav=NAV.map(function(n){
    var active=S.screen===n.id;
    var count=n.id==='prospects'&&S.people.length? '<span class="count">'+S.people.length+'</span>':'';
    return '<button class="'+(active?'active':'')+'" onclick="A.go(\''+n.id+'\')">'+
      '<span style="display:inline-flex;color:'+(active?'var(--teal-h)':'var(--faint)')+'">'+ic(ICONS[n.id],17)+'</span>'+
      '<span style="flex:1">'+n.label+'</span>'+count+'</button>';
  }).join('');
  return '<aside class="sidebar">'+
    '<div class="brand"><div class="logo">R</div><div class="who" style="min-width:0"><div class="n">Rellify</div><div class="r">Founder workspace</div></div></div>'+
    '<div class="sb-div"></div>'+
    '<div class="sb-eyebrow">Workspace</div>'+
    '<nav class="nav">'+nav+'</nav>'+
    '<div class="sb-bottom"><div class="user"><div class="av">R</div><div style="min-width:0;flex:1"><div class="n">Rellify</div><div class="r">AI workflow platform</div></div><span class="pro">PRO</span></div></div>'+
  '</aside>';
}

function vTopbar(){
  return '<header class="topbar">'+
    '<div style="min-width:0"><div class="title">'+esc(TITLES[S.screen])+'</div><div class="date">Rellify · '+TODAY+'</div></div>'+
    '<div class="spacer"></div>'+
    '<button class="run" onclick="A.openPlan()">'+(S.running?
      '<span style="width:13px;height:13px;border:2px solid rgba(255,255,255,0.5);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .9s linear infinite"></span> Running…':
      '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4l14 8-14 8z"></path></svg> Run Agent')+'</button>'+
    '<div class="vdiv"></div>'+
    '<div class="tu"><div class="av">R</div><span class="n" style="font-weight:700;font-size:13px">Rellify</span><span class="pro">PRO</span></div>'+
  '</header>';
}

/* ---------- Dashboard ---------- */
function vDashboard(){
  var hr=new Date().getHours();
  var greet=(hr<12?'Good morning':hr<17?'Good afternoon':'Good evening');
  var doy=Math.floor((Date.now()-new Date(new Date().getFullYear(),0,0))/86400000);
  var q=QUOTES[doy%QUOTES.length];
  var out='<div class="screen">';

  // greeting + quote
  out+='<div style="display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;padding:2px 4px">'+
    '<div><div style="font-size:21px;font-weight:800;letter-spacing:-0.01em">'+greet+', Rellify</div>'+
    '<div style="font-size:12.5px;color:var(--muted);font-weight:600;margin-top:2px">Here\'s where Rellify\'s outreach stands today.</div></div>'+
    '<div style="max-width:520px;border-left:3px solid var(--teal);padding:2px 0 2px 14px">'+
    '<div style="font-size:13px;line-height:1.5;color:var(--sec);font-style:italic">&ldquo;'+esc(q.t)+'&rdquo;</div>'+
    '<div style="font-size:11.5px;font-weight:800;color:var(--teal-h);margin-top:3px">&mdash; '+esc(q.a)+'</div></div></div>';

  // running bar
  if(S.running){
    var rt=(S._runTasks&&S._runTasks[S.runTaskIdx])?S._runTasks[S.runTaskIdx].title:'Starting up…';
    out+='<div style="display:flex;align-items:center;gap:13px;background:#fff;border:1px solid #BFE0DA;border-radius:12px;padding:13px 18px">'+
      '<div style="width:10px;height:10px;border-radius:50%;background:var(--teal);animation:pulse 1.6s infinite;flex-shrink:0"></div>'+

        '<div style="display:flex;align-items:center;gap:10px;min-width:0"><div style="width:30px;height:30px;border-radius:50%;background:'+AV[i%4][0]+';color:'+AV[i%4][1]+';display:grid;place-items:center;font-weight:800;font-size:11px;flex-shrink:0">'+initials(p.name)+'</div><div style="min-width:0"><div style="font-weight:800;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(p.name)+'</div><div style="font-size:11.5px;color:var(--muted);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(p.title)+'</div></div></div>'+
        '<div style="font-size:12.5px;font-weight:700;color:var(--sec)">'+esc(p.company)+'</div>'+
        '<div><div style="display:flex;align-items:center">'+dots+'</div><div style="font-size:11px;font-weight:800;margin-top:5px;color:var(--sec2)">'+esc(p.stage)+' — stage '+(p.stageIdx+1)+' of 5</div></div>'+
        '<div><div class="mono" style="font-weight:700;font-size:13.5px">'+p.score+'</div><div style="font-size:10.5px;font-weight:800;color:var(--teal);margin-top:2px">why '+(expanded?'▾':'▸')+'</div></div>'+
        '<div style="font-size:12px;color:var(--sec2);line-height:1.45">'+esc(p.next)+'</div></button>';
      if(expanded){
        var WHY=['Role & industry fit','Engagement signals','Posting activity','Reachability'],WMAX=[40,30,20,10];
        out+='<div style="padding:16px 20px 18px 58px;background:#FAFCFB;border-bottom:1px solid var(--border-soft);display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:22px;align-items:start">'+
          '<div><div class="eyebrow" style="margin-bottom:9px">Pipeline journey</div><div style="display:flex;flex-direction:column">'+STAGES.map(function(st,si){var done=si<p.stageIdx,cur=si===p.stageIdx;var note=(p.jn&&p.jn[si])||(done?'Completed':cur?'In progress':'Not started yet');return '<div style="display:flex;gap:11px;align-items:stretch"><div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0"><div style="width:12px;height:12px;border-radius:50%;margin-top:3px;box-sizing:border-box;background:'+(done?'#0E8577':'#fff')+';border:2px solid '+((done||cur)?'#0E8577':'#D6DEDC')+'"></div>'+(si<4?'<div style="width:2px;flex:1;background:var(--border);margin:2px 0"></div>':'')+'</div><div style="padding-bottom:12px;min-width:0"><div style="font-size:12.5px;font-weight:800;color:'+(si>p.stageIdx?'var(--faint)':'var(--ink)')+'">'+st+' <span class="mono" style="font-weight:700;color:var(--faint);font-size:10.5px">'+esc((p.when&&p.when[si])||'')+'</span></div><div style="font-size:12px;color:var(--sec2);line-height:1.5;margin-top:1px">'+esc(note)+'</div></div></div>';}).join('')+'</div></div>'+
          '<div><div class="eyebrow" style="margin-bottom:9px">Why the score is '+p.score+'</div><div style="display:flex;flex-direction:column;gap:10px">'+p.why.map(function(w,wi){return '<div><div style="display:flex;justify-content:space-between;gap:10px;font-size:12px;font-weight:800;color:var(--sec)"><span>'+WHY[wi]+'</span><span class="mono" style="font-weight:700">'+w[0]+'/'+WMAX[wi]+'</span></div><div style="height:6px;background:var(--chip);border-radius:4px;margin-top:4px;overflow:hidden"><div style="height:100%;background:var(--teal);border-radius:4px;width:'+Math.round(w[0]/WMAX[wi]*100)+'%"></div></div>'+(w[1]?'<div style="font-size:11.5px;color:var(--muted);margin-top:3px">'+esc(w[1])+'</div>':'')+'</div>';}).join('')+'</div></div>'+
          '<div style="grid-column:1/-1;display:flex;gap:9px;border-top:1px solid var(--border-soft);padding-top:13px"><button class="btn btn-out teal btn-sm" onclick="A.openEdit('+idx+')">Edit prospect</button><button class="btn btn-sm" style="border:1px solid '+(S.confirmDelKey===p.name?'var(--danger)':'var(--danger-bd)')+';background:'+(S.confirmDelKey===p.name?'var(--danger)':'#fff')+';color:'+(S.confirmDelKey===p.name?'#fff':'var(--danger)')+'" onclick="A.delAsk(\''+esc(p.name).replace(/'/g,"\\'")+'\')">'+(S.confirmDelKey===p.name?'Confirm delete?':'Delete')+'</button></div></div>';
      }
      out+='</div>';
    });
    out+='</div>';
  }
  out+='</div>';return out;
}

/* ---------- Activity ---------- */
function vActivity(){
  return '<div class="screen narrow"><div><div class="page-h">Activity</div><div class="page-sub">A complete log of every action taken on your behalf</div></div>'+
    '<div class="card pad"><div class="empty"><b>No activity yet</b>Rellify hasn\'t run a session. Once you approve the ICP and the agent runs, every comment, like, message and review appears here — each with the reasoning behind it and a place to give feedback.</div></div>'+
    '<div style="font-size:12px;color:var(--muted);font-weight:600;text-align:center">Tip: use <b style="color:var(--sec)">Run Agent</b> (top right) to review and approve the first session plan.</div></div>';
}

/* ---------- Strategy (fully populated from onboarding) ---------- */
function vStrategy(){
  var titles=['COO','CIO','CTO','VP / Head of Operations','Head of Digital Transformation','Head of AI / Automation'];
  var gates=['Mid-market: 20–500 employees','United States','Manufacturing · Logistics · Retail/E-com · BPO'];
  var guardrails=['Only approved prospects are contacted','New prospects require your approval before any outreach','Profile views + likes only until the account is warmed up','One message at a time — no follow-up until the prospect replies'];
  var cadence=[['—','likes/day (set after account-type check)'],['—','comments/day'],['0','connection requests (Day 1 — warmup only)'],['2','posts per week']];
  var angles=['AI governance — everyone’s using AI, nobody owns it','Reuse — turning the good prompt into a repeatable workflow','Ownership — your own safe agents on your own data vs a black box'];
  return '<div class="screen" style="max-width:1060px"><div style="background:#0E3B36;border-radius:16px;padding:24px 26px;color:#fff">'+
    '<div style="font-size:11px;font-weight:700;letter-spacing:0.09em;text-transform:uppercase;color:#8FC7BE">Operating strategy</div>'+
    '<div style="font-size:20px;font-weight:800;letter-spacing:-0.01em;margin-top:8px;max-width:760px;line-height:1.4">Get Rellify in front of mid-market ops and tech leaders adopting AI without governance — earn replies with a free reusable blueprint, and turn warm conversations into 30-minute demos.</div>'+
    '<div style="display:flex;gap:22px;flex-wrap:wrap;margin-top:16px">'+[['Owner','Rellify'],['Focus area','AI workflow governance'],['Schedule','Runs on request'],['Posting','2 posts / week']].map(function(f){return '<div><div style="font-size:10.5px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:#8FC7BE">'+f[0]+'</div><div style="font-weight:700;font-size:13px;margin-top:2px">'+f[1]+'</div></div>';}).join('')+'</div></div>'+
    '<div class="grid-auto">'+
      '<div class="card pad"><div class="h-title" style="margin-bottom:10px">Target prospect</div><div style="font-size:13px;line-height:1.6;color:var(--ink2);margin-bottom:12px">COO / CIO / CTO and their operations & transformation leads at mid-market US companies that are adopting AI but lack cohesion or governance. Prospects are added only after your approval.</div>'+
        '<div class="eyebrow" style="margin-bottom:7px">Titles</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">'+titles.map(function(t){return '<span class="chip chip-teal">'+t+'</span>';}).join('')+'</div>'+
        '<div class="eyebrow" style="margin-bottom:7px">Requirements</div><div style="display:flex;flex-wrap:wrap;gap:6px">'+gates.map(function(g){return '<span class="chip chip-amber">'+g+'</span>';}).join('')+'</div></div>'+
      '<div class="card pad"><div class="h-title" style="margin-bottom:10px">Safety rules</div><div style="display:flex;flex-direction:column;gap:9px">'+guardrails.map(function(g){return '<div style="display:flex;gap:9px;align-items:flex-start;font-size:13px;color:var(--ink2);line-height:1.55"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:3px"><path d="M12 22s8-3.5 8-10V5l-8-3-8 3v7c0 6.5 8 10 8 10z"></path></svg><span>'+esc(g)+'</span></div>';}).join('')+'</div></div>'+
      '<div class="card pad"><div class="h-title" style="margin-bottom:10px">Daily limits</div><div style="display:flex;flex-direction:column;gap:8px">'+cadence.map(function(c){return '<div style="display:flex;align-items:center;gap:11px"><span class="mono" style="font-weight:700;font-size:15px;width:22px;text-align:right">'+c[0]+'</span><span style="font-size:13px;font-weight:700;color:var(--sec)">'+esc(c[1])+'</span></div>';}).join('')+'</div></div>'+
      '<div class="card pad"><div class="h-title" style="margin-bottom:10px">Content angles</div><div style="display:flex;flex-direction:column;gap:9px">'+angles.map(function(a){return '<div style="display:flex;gap:9px;align-items:flex-start;font-size:13px;color:var(--ink2);line-height:1.55"><span style="color:var(--teal);font-weight:800;flex-shrink:0">→</span><span>'+esc(a)+'</span></div>';}).join('')+'</div></div>'+
    '</div>'+
    '<div class="card pad"><div class="h-title">Update strategy with AI</div><div class="page-sub" style="margin-bottom:12px">Tell the agent to adjust targeting or tone — e.g. &ldquo;focus on manufacturers over 200 employees&rdquo; or &ldquo;more posts about governance&rdquo;</div><div style="display:flex;gap:10px"><input class="f" style="flex:1;height:40px" placeholder="e.g. Prioritize logistics &amp; supply-chain COOs…"><button class="btn btn-teal btn-lg" onclick="A.toast(\'Prototype — the AI would update the strategy\')">Update strategy</button></div></div>'+
  '</div>';
}

/* ---------- Content ---------- */
function vContent(){
  var status,stBg,stCol,when,metrics,held;
  if(S.postApproval==='approved'){status='Scheduled';stBg='var(--teal-tint)';stCol='var(--teal-h)';when='Next posting slot';metrics='Approved by you · publishes automatically';held=false;}
  else if(S.postApproval==='held'){status='On hold';stBg='var(--amber-tint)';stCol='var(--amber-tx)';when='rejected — re-queue';metrics='';held=false;}
  else{status='On hold';stBg='var(--amber-tint)';stCol='var(--amber-tx)';when='awaiting approval';metrics='';held=true;}
  return '<div class="screen" style="max-width:1060px"><div class="row-wrap"><div><div class="page-h">Content</div><div class="page-sub">You approve every post before it publishes · 2 posts/week cadence</div></div><div class="spacer"></div><button class="btn btn-teal" style="height:36px" onclick="A.toast(\'Prototype — the AI would draft a new post for review\')">✦ Generate post with AI</button></div>'+
    (S.postApproval==='approved'?'':'<div style="background:var(--amber-tint);border:1px solid var(--amber-bd);border-radius:12px;padding:12px 16px;font-size:13px;font-weight:700;color:var(--amber-tx)">Posting is paused — Post #1 is awaiting your approval.</div>')+
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;align-items:start">'+
      '<div class="card" style="padding:16px 18px;display:flex;flex-direction:column;gap:10px"><div style="display:flex;align-items:center;gap:8px"><span class="badge" style="background:'+stBg+';color:'+stCol+'">'+status+'</span><span class="mono" style="font-size:11.5px;color:var(--faint);font-weight:700">'+when+'</span></div>'+
        '<div style="font-size:13px;line-height:1.6;color:var(--ink2)">'+esc(POST_BODY)+'</div>'+
        (metrics?'<div style="font-size:12px;color:var(--muted);font-weight:700">'+esc(metrics)+'</div>':'')+
        (held?'<div style="display:flex;gap:8px"><button class="btn btn-teal btn-sm" onclick="A.approvePost()">Approve &amp; schedule</button><button class="btn btn-out btn-sm" onclick="A.toast(\'Post #1 stays on hold\')">Keep on hold</button></div>':'')+'</div>'+
      '<div class="card pad" style="display:flex;flex-direction:column;justify-content:center"><div class="empty" style="border:none;background:none;padding:8px"><b>More drafts appear here</b>At 2 posts/week the agent drafts ahead and queues each one for your approval. Posted content will show impressions and engagement.</div></div>'+
    '</div></div>';
}

/* ---------- Conversations ---------- */
function vConversations(){
  return '<div class="screen" style="max-width:1060px"><div class="row-wrap"><div><div class="page-h">Conversations</div><div class="page-sub">LinkedIn inbox replies &amp; AI-drafted responses — you review before anything sends</div></div><div class="spacer"></div><button class="btn btn-out" onclick="A.toast(\'Inbox refreshed\')">↻ Refresh inbox</button></div>'+
    '<div class="card pad"><div class="empty"><b>No conversations yet</b>Once prospects accept connections and reply, their threads land here. Rellify drafts a suggested reply for each — you approve or edit before it ever sends.</div></div></div>';
}

/* ---------- Analytics ---------- */
function vAnalytics(){
  var stats=[['Connections','4,000+','Account baseline'],['Profile views','—','No data yet — first session pending'],['Post impressions','—','Starts after Post #1 publishes'],['Prospects sourced','0','Awaiting ICP approval']];
  return '<div class="screen" style="max-width:1060px"><div><div class="page-h">Analytics</div><div class="page-sub">Network growth, engagement and pipeline velocity — populates after the first session</div></div>'+
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px">'+stats.map(function(s){return '<div class="card pad"><div class="eyebrow">'+s[0]+'</div><div style="display:flex;align-items:baseline;gap:8px;margin-top:4px"><span class="mono" style="font-size:26px;font-weight:800;letter-spacing:-0.02em">'+s[1]+'</span></div><div style="font-size:11.5px;color:var(--faint);font-weight:600;margin-top:3px">'+esc(s[2])+'</div></div>';}).join('')+'</div>'+
    '<div class="card pad"><div class="h-title" style="margin-bottom:10px">Nothing to chart yet</div><div class="empty" style="border:none;background:none">Impression trends, agent-action mix and top-engaged prospects appear here after the first agent session runs. Approve your ICP and hit <b style="display:inline">Run Agent</b> to begin.</div></div></div>';
}

/* ---------- Modals ---------- */
function vPlanModal(){
  if(!S.planOpen)return '';
  var onCount=S.planOn.filter(Boolean).length;
  return '<div class="overlay" onclick="A.closePlan()"><div class="modal" onclick="event.stopPropagation()">'+
    '<div style="font-weight:800;font-size:16px">Today\'s plan</div><div class="page-sub" style="margin-bottom:16px">Review what the agent will do. Untick anything you don\'t want to run, then approve.</div>'+
    '<div style="display:flex;flex-direction:column;gap:9px">'+PLAN_TASKS.map(function(t,i){var on=S.planOn[i];return '<button onclick="A.togglePlan('+i+')" style="display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;cursor:pointer;font-family:inherit;border:1px solid '+(on?'#BFE0DA':'var(--border)')+';background:'+(on?'#F7FBFA':'#fff')+';border-radius:12px;padding:12px 14px"><div style="width:20px;height:20px;border-radius:6px;display:grid;place-items:center;flex-shrink:0;margin-top:1px;border:2px solid '+(on?'var(--teal)':'#C6D0CE')+';background:'+(on?'var(--teal)':'#fff')+'">'+(on?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>':'')+'</div><div style="min-width:0"><div style="font-weight:800;font-size:13.5px;color:'+(on?'var(--ink)':'var(--faint)')+'">'+esc(t.title)+'</div><div style="font-size:12.5px;color:var(--muted);line-height:1.5;margin-top:2px">'+esc(t.desc)+'</div></div></button>';}).join('')+'</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:15px"><div style="border:1px solid var(--border-soft);background:#FAFCFB;border-radius:11px;padding:11px 14px"><div class="eyebrow">Estimated duration</div><div style="font-weight:800;font-size:13.5px;margin-top:3px">'+(onCount?(onCount*3)+'–'+(onCount*4)+' minutes':'—')+'</div></div><div style="border:1px solid var(--border-soft);background:#FAFCFB;border-radius:11px;padding:11px 14px"><div class="eyebrow">Expected outcomes</div><div style="font-weight:800;font-size:13.5px;margin-top:3px">account check · first sourcing · warmups</div></div></div>'+
    '<div style="display:flex;gap:10px;margin-top:18px"><button class="btn btn-teal btn-lg" style="flex:1" onclick="A.approvePlan()">✓ Approve &amp; start agent</button><button class="btn btn-out btn-lg" onclick="A.closePlan()">Cancel</button></div></div></div>';
}
function vEditorModal(){
  if(!S.editorOpen)return '';
  var p=S.editorIdx!=null?S.people[S.editorIdx]:null;
  return '<div class="overlay" onclick="A.closeEditor()"><div class="modal" style="width:520px" onclick="event.stopPropagation()">'+
    '<div style="font-weight:800;font-size:16px">'+(p?'Edit prospect':'Add prospect')+'</div><div class="page-sub" style="margin-bottom:16px">Manually added prospects follow the same rules — no outreach happens until they\'re approved.</div>'+
    '<div style="display:flex;flex-direction:column;gap:13px">'+
      '<div><div style="font-size:12px;font-weight:800;margin-bottom:5px">Full name <span style="color:var(--danger)">*</span></div><input id="eName" class="f" placeholder="e.g. Priya Iyer" value="'+esc(p?p.name:'')+'"></div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><div><div style="font-size:12px;font-weight:800;margin-bottom:5px">Title</div><input id="eTitle" class="f" placeholder="e.g. COO" value="'+esc(p?p.title:'')+'"></div><div><div style="font-size:12px;font-weight:800;margin-bottom:5px">Company</div><input id="eCompany" class="f" placeholder="e.g. Northwind Logistics" value="'+esc(p&&p.company!=='—'?p.company:'')+'"></div></div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><div><div style="font-size:12px;font-weight:800;margin-bottom:5px">Pipeline stage</div><select id="eStage" class="f">'+['Approved','Warming','Connected','Conversation','Meeting set'].map(function(o){var v=o==='Approved'?'Approved':o;return '<option '+((p&&p.stage===o)?'selected':'')+' value="'+o+'">'+o+'</option>';}).join('')+'</select></div><div><div style="font-size:12px;font-weight:800;margin-bottom:5px">Score <span style="color:var(--faint);font-weight:600">(0–100)</span></div><input id="eScore" class="f mono" type="number" min="0" max="100" value="'+esc(p?p.score:60)+'"></div></div>'+
      '<div><div style="font-size:12px;font-weight:800;margin-bottom:5px">Next step note</div><input id="eNext" class="f" placeholder="e.g. Warm up, then request connection" value="'+esc(p&&p.next!=='No next step set'?p.next:'')+'"></div>'+
    '</div><div style="display:flex;gap:10px;margin-top:20px"><button class="btn btn-teal" style="height:38px" onclick="A.saveEditor()">'+(p?'Save changes':'Add prospect')+'</button><button class="btn btn-out" style="height:38px" onclick="A.closeEditor()">Cancel</button></div></div></div>';
}

/* ============================ Render ============================ */
function render(){
  var body;
  switch(S.screen){
    case 'prospects':body=vProspects();break;
    case 'activity':body=vActivity();break;
    case 'strategy':body=vStrategy();break;
    case 'content':body=vContent();break;
    case 'conversations':body=vConversations();break;
    case 'analytics':body=vAnalytics();break;
    default:body=vDashboard();
  }
  var html='<div class="app">'+vSidebar()+'<div class="main">'+vTopbar()+'<main class="scroll">'+body+'</main></div></div>'+
    vPlanModal()+vEditorModal()+
    (S.toast?'<div class="toast">'+esc(S.toast)+'</div>':'');
  document.getElementById('app').innerHTML=html;
}
document.addEventListener('keydown',function(e){if(e.key==='Escape'){if(S.editorOpen){S.editorOpen=false;render();}else if(S.planOpen){S.planOpen=false;render();}}});
render();
</script>
</body>
</html>
